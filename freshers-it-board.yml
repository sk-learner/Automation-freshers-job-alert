name: Refresh Freshers IT Board

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: freshers-it-board
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh board
        run: python scripts/refresh_freshers_it_board.py

      - name: Commit updated board artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/freshers-job-board.html outputs/freshers-job-board.csv outputs/freshers-job-board.json docs/index.html docs/freshers-job-board.csv docs/freshers-job-board.json
          git diff --cached --quiet && exit 0
          git commit -m "Refresh freshers IT board"
          git push
